<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TextTaskManager</title>
<style>
:root {
  --bg: #1a1b26;
  --bg-surface: #24283b;
  --bg-hover: #2f3549;
  --border: #3b4261;
  --text: #c0caf5;
  --text-dim: #565f89;
  --accent: #7aa2f7;
  --green: #9ece6a;
  --yellow: #e0af68;
  --red: #f7768e;
  --purple: #bb9af7;
  --cyan: #7dcfff;
  --orange: #ff9e64;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
}

/* ─── Layout ───────────────────────────────── */
.app {
  display: grid;
  grid-template-rows: auto 1fr;
  height: 100vh;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
}

header h1 {
  font-size: 15px;
  font-weight: 600;
  color: var(--accent);
}

.nav-tabs {
  display: flex;
  gap: 4px;
}

.nav-tabs button {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-dim);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  transition: all 0.15s;
}

.nav-tabs button:hover {
  color: var(--text);
  background: var(--bg-hover);
}

.nav-tabs button.active {
  color: var(--accent);
  background: var(--bg);
  border-color: var(--border);
}

.header-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

.btn {
  background: var(--accent);
  color: var(--bg);
  border: none;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  transition: opacity 0.15s;
}

.btn:hover { opacity: 0.85; }
.btn-ghost {
  background: transparent;
  color: var(--text-dim);
  border: 1px solid var(--border);
}
.btn-ghost:hover { color: var(--text); background: var(--bg-hover); }

/* ─── Main Content ─────────────────────────── */
main {
  overflow-y: auto;
  padding: 20px;
}

/* ─── Task List View ───────────────────────── */
.task-list {
  max-width: 900px;
  margin: 0 auto;
}

.task-item {
  display: grid;
  grid-template-columns: 50px 100px 1fr auto;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-radius: 6px;
  border: 1px solid transparent;
  transition: all 0.1s;
}

.task-item:hover {
  background: var(--bg-surface);
  border-color: var(--border);
}

.task-id {
  font-weight: 600;
  color: var(--text-dim);
  font-size: 11px;
}

.task-state {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 4px;
  text-align: center;
  cursor: pointer;
  transition: opacity 0.15s;
}

.task-state:hover { opacity: 0.7; }

.state-backlog { background: #3b4261; color: #a9b1d6; }
.state-in-progress { background: #3d3420; color: var(--yellow); }
.state-waiting { background: #2d2640; color: var(--purple); }
.state-testing { background: #1a3040; color: var(--cyan); }
.state-done { background: #1a3020; color: var(--green); }
.state-cancelled { background: #3d2020; color: var(--red); }

.task-title {
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.task-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  font-size: 11px;
  color: var(--text-dim);
}

.task-meta .priority { font-weight: 600; }
.priority-urgent { color: var(--red); }
.priority-high { color: var(--orange); }
.priority-medium { color: var(--text); }
.priority-low { color: var(--text-dim); }

.task-meta .due { color: var(--cyan); }
.task-meta .due.overdue { color: var(--red); }

.subtask-list {
  grid-column: 1 / -1;
  padding-left: 62px;
}

.subtask-item {
  display: flex;
  gap: 10px;
  align-items: center;
  padding: 4px 0;
  font-size: 12px;
  color: var(--text-dim);
}

/* ─── Kanban View ──────────────────────────── */
.kanban-board {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding-bottom: 20px;
  min-height: calc(100vh - 120px);
}

.kanban-column {
  flex: 1;
  min-width: 220px;
  max-width: 320px;
  background: var(--bg-surface);
  border-radius: 8px;
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}

.kanban-column-header {
  padding: 12px 14px;
  font-weight: 600;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.kanban-column-header .count {
  background: var(--bg);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  color: var(--text-dim);
}

.kanban-cards {
  padding: 8px;
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.kanban-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  cursor: pointer;
  transition: all 0.1s;
}

.kanban-card:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
}

.kanban-card .card-id {
  font-size: 10px;
  color: var(--text-dim);
  margin-bottom: 4px;
}

.kanban-card .card-title {
  font-size: 12px;
  margin-bottom: 6px;
}

.kanban-card .card-meta {
  display: flex;
  gap: 6px;
  font-size: 10px;
}

.kanban-card .card-meta span {
  padding: 1px 6px;
  border-radius: 3px;
  background: var(--bg-surface);
}

/* ─── Agenda View ──────────────────────────── */
.agenda-view {
  max-width: 700px;
  margin: 0 auto;
}

.agenda-group {
  margin-bottom: 24px;
}

.agenda-group-title {
  font-weight: 600;
  font-size: 13px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}

.agenda-group-title.overdue { color: var(--red); }
.agenda-group-title.today { color: var(--yellow); }
.agenda-group-title.soon { color: var(--cyan); }

.agenda-empty {
  color: var(--text-dim);
  font-style: italic;
  padding: 8px 0;
}

/* ─── Stats View ───────────────────────────── */
.stats-view {
  max-width: 600px;
  margin: 0 auto;
}

.stats-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 16px;
}

.stats-card h3 {
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
}

.stats-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.stats-bar .label {
  width: 120px;
  font-size: 12px;
}

.stats-bar .bar {
  flex: 1;
  height: 8px;
  background: var(--bg);
  border-radius: 4px;
  overflow: hidden;
}

.stats-bar .bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.3s;
}

.stats-bar .value {
  font-size: 12px;
  font-weight: 600;
  width: 30px;
  text-align: right;
}

/* ─── Modal ────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 24px;
  width: 400px;
  max-width: 90vw;
}

.modal h2 {
  font-size: 15px;
  margin-bottom: 16px;
}

.modal label {
  display: block;
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 4px;
  margin-top: 12px;
}

.modal input, .modal select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 6px;
  font-family: inherit;
  font-size: 13px;
}

.modal input:focus, .modal select:focus {
  outline: none;
  border-color: var(--accent);
}

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 20px;
}

/* ─── Responsive ───────────────────────────── */
@media (max-width: 768px) {
  .task-item {
    grid-template-columns: 40px 80px 1fr;
  }
  .task-meta { display: none; }
  .kanban-column { min-width: 180px; }
}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>TTM</h1>
    <nav class="nav-tabs">
      <button class="active" data-view="tasks">Tasks</button>
      <button data-view="kanban">Kanban</button>
      <button data-view="agenda">Agenda</button>
      <button data-view="stats">Stats</button>
    </nav>
    <div class="header-actions">
      <button class="btn-ghost btn" onclick="refreshData()">Refresh</button>
      <button class="btn" onclick="openNewTaskModal()">+ New Task</button>
    </div>
  </header>

  <main id="main-content">
    <!-- Content rendered by JS -->
  </main>
</div>

<!-- New Task Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">New Task</h2>
    <label>Title</label>
    <input type="text" id="input-title" placeholder="Task title..." autofocus>
    <label>State</label>
    <select id="input-state">
      <option value="BACKLOG">BACKLOG</option>
      <option value="IN PROGRESS">IN PROGRESS</option>
      <option value="WAITING">WAITING</option>
      <option value="TESTING">TESTING</option>
      <option value="DONE">DONE</option>
    </select>
    <label>Priority</label>
    <select id="input-priority">
      <option value="">None</option>
      <option value="LOW">LOW</option>
      <option value="MEDIUM">MEDIUM</option>
      <option value="HIGH">HIGH</option>
      <option value="URGENT">URGENT</option>
    </select>
    <label>Due Date (dd/mm/yyyy)</label>
    <input type="text" id="input-due" placeholder="dd/mm/yyyy">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="submitNewTask()">Create</button>
    </div>
  </div>
</div>

<script>
// ─── State ────────────────────────────────────
let currentView = 'tasks';
let tasksData = [];
let showAll = false;

// ─── API ──────────────────────────────────────
async function api(path, options = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json' },
    ...options,
  });
  return res.json();
}

// ─── Navigation ───────────────────────────────
document.querySelectorAll('.nav-tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    renderView();
  });
});

// ─── Render ───────────────────────────────────
async function renderView() {
  const main = document.getElementById('main-content');
  main.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-dim)">Loading...</div>';

  switch (currentView) {
    case 'tasks': await renderTasks(); break;
    case 'kanban': await renderKanban(); break;
    case 'agenda': await renderAgenda(); break;
    case 'stats': await renderStats(); break;
  }
}

async function renderTasks() {
  const view = showAll ? 'all' : 'pending';
  const data = await api(`/api/tasks?view=${view}`);
  tasksData = data.tasks;
  const main = document.getElementById('main-content');

  if (!data.tasks.length) {
    main.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-dim)">No tasks found</div>';
    return;
  }

  let html = '<div class="task-list">';
  html += `<div style="margin-bottom:12px;display:flex;gap:8px">
    <button class="btn btn-ghost" style="font-size:11px" onclick="toggleShowAll()">
      ${showAll ? 'Show Pending' : 'Show All'}
    </button>
  </div>`;

  for (const task of data.tasks) {
    html += renderTaskItem(task);
  }
  html += '</div>';
  main.innerHTML = html;
}

function renderTaskItem(task) {
  const stateClass = 'state-' + task.state.toLowerCase().replace(/\s+/g, '-');
  const priorityClass = task.priority ? 'priority-' + task.priority.toLowerCase() : '';

  let metaHtml = '';
  if (task.priority) metaHtml += `<span class="priority ${priorityClass}">${task.priority}</span>`;
  if (task.due_date) {
    const isOverdue = isDateOverdue(task.due_date);
    metaHtml += `<span class="due ${isOverdue ? 'overdue' : ''}">${task.due_date}</span>`;
  }

  let html = `<div class="task-item">
    <span class="task-id">[${task.id}]</span>
    <span class="task-state ${stateClass}" onclick="cycleState('${task.id}', '${task.state}')">${task.state}</span>
    <span class="task-title">${escHtml(task.title)}</span>
    <span class="task-meta">${metaHtml}</span>`;

  if (task.subtasks && task.subtasks.length) {
    html += '<div class="subtask-list">';
    for (const st of task.subtasks) {
      const stClass = 'state-' + st.state.toLowerCase().replace(/\s+/g, '-');
      html += `<div class="subtask-item">
        <span class="task-id">[${st.id}]</span>
        <span class="task-state ${stClass}" style="font-size:10px;padding:2px 6px" onclick="cycleState('${st.id}', '${st.state}')">${st.state}</span>
        <span>${escHtml(st.title)}</span>
      </div>`;
    }
    html += '</div>';
  }

  html += '</div>';
  return html;
}

async function renderKanban() {
  const data = await api('/api/kanban');
  const main = document.getElementById('main-content');

  let html = '<div class="kanban-board">';
  for (const col of data.columns) {
    const tasks = data.tasks[col] || [];
    const color = getStateColor(col);
    html += `<div class="kanban-column">
      <div class="kanban-column-header" style="color:${color}">
        ${col}
        <span class="count">${tasks.length}</span>
      </div>
      <div class="kanban-cards">`;

    for (const task of tasks) {
      let meta = '';
      if (task.priority) meta += `<span class="priority-${task.priority.toLowerCase()}">${task.priority[0]}</span>`;
      if (task.due_date) meta += `<span>${task.due_date}</span>`;

      html += `<div class="kanban-card" onclick="cycleState('${task.id}', '${task.state}')">
        <div class="card-id">[${task.id}]</div>
        <div class="card-title">${escHtml(task.title)}</div>
        ${meta ? `<div class="card-meta">${meta}</div>` : ''}
      </div>`;
    }

    html += '</div></div>';
  }
  html += '</div>';
  main.innerHTML = html;
}

async function renderAgenda() {
  const data = await api('/api/agenda?days=7');
  const main = document.getElementById('main-content');

  let html = '<div class="agenda-view">';

  html += renderAgendaGroup('Overdue', data.overdue, 'overdue');
  html += renderAgendaGroup('Due Today', data.due_today, 'today');
  html += renderAgendaGroup(`Due Next ${data.days_ahead} Days`, data.due_soon, 'soon');

  html += '</div>';
  main.innerHTML = html;
}

function renderAgendaGroup(title, tasks, cssClass) {
  let html = `<div class="agenda-group">
    <div class="agenda-group-title ${cssClass}">${title} (${tasks.length})</div>`;

  if (!tasks.length) {
    html += '<div class="agenda-empty">None</div>';
  } else {
    for (const task of tasks) {
      html += renderTaskItem(task);
    }
  }
  html += '</div>';
  return html;
}

async function renderStats() {
  const data = await api('/api/stats');
  const main = document.getElementById('main-content');
  const total = data.total || 1;

  let html = '<div class="stats-view">';

  // Summary cards
  html += `<div class="stats-card">
    <h3>Overview</h3>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;text-align:center">
      <div><div style="font-size:24px;font-weight:700;color:var(--red)">${data.overdue}</div><div style="font-size:11px;color:var(--text-dim)">Overdue</div></div>
      <div><div style="font-size:24px;font-weight:700;color:var(--yellow)">${data.due_today}</div><div style="font-size:11px;color:var(--text-dim)">Due Today</div></div>
      <div><div style="font-size:24px;font-weight:700;color:var(--cyan)">${data.due_this_week}</div><div style="font-size:11px;color:var(--text-dim)">Due This Week</div></div>
    </div>
  </div>`;

  // By state
  html += '<div class="stats-card"><h3>By State</h3>';
  for (const [state, count] of Object.entries(data.by_state)) {
    const pct = Math.round((count / total) * 100);
    const color = getStateColor(state);
    html += `<div class="stats-bar">
      <span class="label" style="color:${color}">${state}</span>
      <div class="bar"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="value">${count}</span>
    </div>`;
  }
  html += '</div>';

  // By priority
  if (Object.keys(data.by_priority).length) {
    html += '<div class="stats-card"><h3>By Priority</h3>';
    for (const [prio, count] of Object.entries(data.by_priority)) {
      const pct = Math.round((count / total) * 100);
      const color = getPriorityColor(prio);
      html += `<div class="stats-bar">
        <span class="label" style="color:${color}">${prio}</span>
        <div class="bar"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
        <span class="value">${count}</span>
      </div>`;
    }
    html += '</div>';
  }

  html += '</div>';
  main.innerHTML = html;
}

// ─── Actions ──────────────────────────────────
const STATE_ORDER = ['BACKLOG', 'IN PROGRESS', 'TESTING', 'DONE'];

async function cycleState(taskId, currentState) {
  const idx = STATE_ORDER.indexOf(currentState);
  const nextState = STATE_ORDER[(idx + 1) % STATE_ORDER.length];

  await api(`/api/tasks/${taskId}/state`, {
    method: 'POST',
    body: JSON.stringify({ state: nextState }),
  });
  renderView();
}

function toggleShowAll() {
  showAll = !showAll;
  renderView();
}

async function refreshData() {
  renderView();
}

// ─── Modal ────────────────────────────────────
function openNewTaskModal() {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('input-title').value = '';
  document.getElementById('input-state').value = 'BACKLOG';
  document.getElementById('input-priority').value = '';
  document.getElementById('input-due').value = '';
  setTimeout(() => document.getElementById('input-title').focus(), 100);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

async function submitNewTask() {
  const title = document.getElementById('input-title').value.trim();
  if (!title) return;

  await api('/api/tasks', {
    method: 'POST',
    body: JSON.stringify({
      title,
      state: document.getElementById('input-state').value,
      priority: document.getElementById('input-priority').value || null,
      due_date: document.getElementById('input-due').value || null,
    }),
  });

  closeModal();
  renderView();
}

// Close modal on Escape or overlay click
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('open')) {
    submitNewTask();
  }
});

// ─── Helpers ──────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function isDateOverdue(dateStr) {
  if (!dateStr) return false;
  const [d, m, y] = dateStr.split('/').map(Number);
  const due = new Date(y, m - 1, d);
  const today = new Date();
  today.setHours(0,0,0,0);
  return due < today;
}

function getStateColor(state) {
  const map = {
    'BACKLOG': '#a9b1d6',
    'IN PROGRESS': '#e0af68',
    'WAITING': '#bb9af7',
    'TESTING': '#7dcfff',
    'DONE': '#9ece6a',
    'CANCELLED': '#f7768e',
  };
  return map[state] || '#a9b1d6';
}

function getPriorityColor(prio) {
  const map = {
    'URGENT': '#f7768e',
    'HIGH': '#ff9e64',
    'MEDIUM': '#c0caf5',
    'LOW': '#565f89',
  };
  return map[prio] || '#c0caf5';
}

// ─── Init ─────────────────────────────────────
renderView();
</script>
</body>
</html>
